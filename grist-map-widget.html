<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Map — Tech It</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Grist Plugin API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Modern dark tile overrides ── */
    .leaflet-container {
      background: #1a1a24;
      font-family: 'Inter', sans-serif;
    }

    .leaflet-control-zoom a {
      background: #1e1e2e !important;
      color: #a0a0b8 !important;
      border: 1px solid #2a2a3c !important;
      border-radius: 8px !important;
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 16px !important;
      transition: all 0.2s;
    }
    .leaflet-control-zoom a:hover {
      background: #5914D0 !important;
      color: #fff !important;
    }
    .leaflet-control-zoom {
      border: none !important;
      border-radius: 10px !important;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
    }

    .leaflet-control-attribution {
      background: rgba(15,15,19,0.8) !important;
      color: #666 !important;
      font-size: 10px !important;
      backdrop-filter: blur(8px);
      border-radius: 6px 0 0 0 !important;
    }
    .leaflet-control-attribution a { color: #888 !important; }

    /* ── Custom popup ── */
    .leaflet-popup-content-wrapper {
      background: #1e1e2e !important;
      border: 1px solid #2a2a3c !important;
      border-radius: 14px !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(89,20,208,0.15) !important;
      padding: 0 !important;
      min-width: 260px;
    }
    .leaflet-popup-tip {
      background: #1e1e2e !important;
      border: 1px solid #2a2a3c !important;
      box-shadow: none !important;
    }
    .leaflet-popup-close-button {
      color: #666 !important;
      font-size: 20px !important;
      top: 8px !important;
      right: 10px !important;
      transition: color 0.2s;
    }
    .leaflet-popup-close-button:hover { color: #fff !important; }

    .popup-card {
      padding: 16px 18px;
    }
    .popup-card .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3c;
    }
    .popup-card .popup-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .popup-card .popup-icon.haute { background: rgba(255,99,71,0.15); }
    .popup-card .popup-icon.moyenne { background: rgba(255,165,0,0.15); }
    .popup-card .popup-icon.basse { background: rgba(135,206,235,0.15); }
    .popup-card .popup-icon.exclu { background: rgba(100,100,100,0.15); }

    .popup-card .popup-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f5;
      line-height: 1.3;
    }
    .popup-card .popup-subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .popup-card .popup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .popup-card .popup-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .popup-card .popup-field.full { grid-column: 1 / -1; }
    .popup-card .popup-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      font-weight: 500;
    }
    .popup-card .popup-value {
      font-size: 12.5px;
      color: #ccc;
      font-weight: 500;
    }
    .popup-card .popup-value a {
      color: #9b6dff;
      text-decoration: none;
    }
    .popup-card .popup-value a:hover { text-decoration: underline; }

    .popup-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .popup-badge.opened { background: rgba(89,20,208,0.15); color: #b68aff; }
    .popup-badge.not-opened { background: rgba(100,100,100,0.15); color: #888; }
    .popup-badge.prio-haute { background: rgba(255,99,71,0.2); color: #ff8a75; }
    .popup-badge.prio-moyenne { background: rgba(255,165,0,0.2); color: #ffc266; }
    .popup-badge.prio-basse { background: rgba(135,206,235,0.2); color: #87ceeb; }

    .popup-card .popup-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .popup-card .popup-footer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2a3c;
      display: flex;
      gap: 6px;
    }
    .popup-card .popup-footer .btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .popup-card .popup-footer .btn-primary {
      background: #5914D0;
      color: #fff;
    }
    .popup-card .popup-footer .btn-primary:hover { background: #6d2ee0; }
    .popup-card .popup-footer .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: #aaa;
      border: 1px solid #2a2a3c;
    }
    .popup-card .popup-footer .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      color: #ddd;
    }

    /* ── Cluster styling ── */
    .marker-cluster {
      background: rgba(89,20,208,0.2) !important;
      border: 2px solid rgba(89,20,208,0.4) !important;
      border-radius: 50% !important;
    }
    .marker-cluster div {
      background: #5914D0 !important;
      color: #fff !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      font-size: 13px !important;
      border-radius: 50% !important;
    }
    .marker-cluster-small { background: rgba(89,20,208,0.15) !important; }
    .marker-cluster-medium { background: rgba(89,20,208,0.25) !important; }
    .marker-cluster-large { background: rgba(89,20,208,0.35) !important; }

    /* ── Stats overlay ── */
    #stats-panel {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
    }
    .stat-chip {
      background: rgba(30,30,46,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #2a2a3c;
      border-radius: 10px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: auto;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stat-chip:hover {
      border-color: #5914D0;
      transform: translateY(-1px);
    }
    .stat-chip.active {
      border-color: #5914D0;
      background: rgba(89,20,208,0.15);
    }
    .stat-chip .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stat-chip .stat-num {
      font-size: 15px;
      font-weight: 700;
      color: #f0f0f5;
    }
    .stat-chip .stat-label {
      font-size: 11px;
      color: #888;
      font-weight: 500;
    }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 30px;
      left: 14px;
      z-index: 1000;
      background: rgba(30,30,46,0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #2a2a3c;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #999;
      font-weight: 500;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* ── Loading ── */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 2000;
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #2a2a3c;
      border-top-color: #5914D0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading span { color: #666; font-size: 13px; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    <span>Chargement de la carte...</span>
  </div>

  <div id="stats-panel"></div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#5914D0"></div>Haute</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Moyenne</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Basse</div>
    <div class="legend-item"><div class="legend-dot" style="background:#555"></div>Exclu</div>
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Sélection</div>
  </div>

  <div id="map"></div>

  <script>
    // ── CONFIG ──
    const COLORS = {
      haute: '#ef4444',
      moyenne: '#f59e0b',
      basse: '#3b82f6',
      exclu: '#555',
      bounce: '#555',
      selected: '#22c55e'
    };

    const TILE_URL = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    const TILE_ATTR = '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/">OSM</a>';

    // ── MAP INIT ──
    const map = L.map('map', {
      center: [48.5, 7.0],
      zoom: 8,
      zoomControl: true,
      attributionControl: true
    });

    L.tileLayer(TILE_URL, {
      attribution: TILE_ATTR,
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // Move zoom to bottom-right
    map.zoomControl.setPosition('bottomright');

    // ── MARKER CLUSTER ──
    const clusterGroup = L.markerClusterGroup({
      maxClusterRadius: 45,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        let size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
        return L.divIcon({
          html: '<div>' + count + '</div>',
          className: 'marker-cluster marker-cluster-' + size,
          iconSize: L.point(42, 42)
        });
      }
    });
    map.addLayer(clusterGroup);

    // ── CUSTOM MARKER ICONS ──
    function createIcon(color, isSelected) {
      const size = isSelected ? 16 : 11;
      const border = isSelected ? `3px solid #fff` : `2px solid ${color}`;
      const shadow = isSelected ? '0 0 12px rgba(34,197,94,0.6)' : `0 0 8px ${color}44`;
      const zIdx = isSelected ? 1000 : 1;
      return L.divIcon({
        className: '',
        html: `<div style="
          width:${size}px;height:${size}px;
          background:${color};
          border:${border};
          border-radius:50%;
          box-shadow:${shadow};
          transition:all 0.2s;
        "></div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
        popupAnchor: [0, -size/2 - 4]
      });
    }

    function getPrioColor(prio, statut) {
      if (statut === 'Exclu' || statut === 'Bounce') return COLORS.exclu;
      const p = (prio || '').toLowerCase();
      return COLORS[p] || COLORS.basse;
    }

    // ── POPUP HTML ──
    function makePopup(r) {
      const prio = r.Priorite || '';
      const prioClass = prio ? 'prio-' + prio.toLowerCase() : '';
      const iconClass = prio ? prio.toLowerCase() : 'exclu';
      const opened = r.A_Ouvert === 'Oui';
      const phone = r.Telephone || '';
      const phoneLink = phone ? phone.replace(/\s/g, '') : '';

      return `
        <div class="popup-card">
          <div class="popup-header">
            <div class="popup-icon ${iconClass}">
              ${prio === 'Haute' ? '🔥' : prio === 'Moyenne' ? '📧' : prio === 'Basse' ? '📋' : '⛔'}
            </div>
            <div>
              <div class="popup-title">${r.Nom_Ecole || 'École inconnue'}</div>
              <div class="popup-subtitle">${r.Commune || ''} ${r.Code_Postal || ''} · ${r.Departement || ''}</div>
            </div>
          </div>

          <div class="popup-tags">
            <span class="popup-badge ${opened ? 'opened' : 'not-opened'}">
              ${opened ? '✉️ Ouvert ×' + (r.Total_Opens || 1) : '— Pas ouvert'}
            </span>
            ${prio ? `<span class="popup-badge ${prioClass}">${prio}</span>` : ''}
          </div>

          <div class="popup-grid" style="margin-top:12px">
            <div class="popup-field">
              <span class="popup-label">Téléphone</span>
              <span class="popup-value">${phone ? `<a href="tel:${phoneLink}">${phone}</a>` : '—'}</span>
            </div>
            <div class="popup-field">
              <span class="popup-label">Statut</span>
              <span class="popup-value">${r.Statut_Appel || '—'}</span>
            </div>
            <div class="popup-field">
              <span class="popup-label">Email</span>
              <span class="popup-value"><a href="mailto:${r.Email || ''}">${(r.Email || '—').replace('@', '<wbr>@')}</a></span>
            </div>
            <div class="popup-field">
              <span class="popup-label">Campaign</span>
              <span class="popup-value">${r.Campaign || '—'}</span>
            </div>
            ${r.Entreprises_Associees ? `
            <div class="popup-field full">
              <span class="popup-label">Entreprises proches</span>
              <span class="popup-value">${(r.Entreprises_Associees || '').substring(0, 80)}${(r.Entreprises_Associees || '').length > 80 ? '...' : ''}</span>
            </div>` : ''}
            ${r.Notes ? `
            <div class="popup-field full">
              <span class="popup-label">Notes</span>
              <span class="popup-value">${r.Notes}</span>
            </div>` : ''}
          </div>

          ${phone ? `
          <div class="popup-footer">
            <button class="btn btn-primary" onclick="window.open('tel:${phoneLink}')">📞 Appeler</button>
            <button class="btn btn-ghost" onclick="window.open('mailto:${r.Email || ''}')">✉️ Email</button>
          </div>` : ''}
        </div>
      `;
    }

    // ── STATE ──
    let allRecords = [];
    let markers = {};
    let selectedId = null;
    let activeFilter = null;

    // ── STATS PANEL ──
    function updateStats(records) {
      const panel = document.getElementById('stats-panel');
      const total = records.length;
      const haute = records.filter(r => r.Priorite === 'Haute').length;
      const moyenne = records.filter(r => r.Priorite === 'Moyenne').length;
      const basse = records.filter(r => r.Priorite === 'Basse').length;
      const opened = records.filter(r => r.A_Ouvert === 'Oui').length;

      const chips = [
        { key: null, num: total, label: 'Total', color: '#fff' },
        { key: 'opened', num: opened, label: 'Ouvertures', color: '#a78bfa' },
        { key: 'Haute', num: haute, label: 'Haute', color: COLORS.haute },
        { key: 'Moyenne', num: moyenne, label: 'Moyenne', color: COLORS.moyenne },
        { key: 'Basse', num: basse, label: 'Basse', color: COLORS.basse },
      ];

      panel.innerHTML = chips.map(c => `
        <div class="stat-chip ${activeFilter === c.key ? 'active' : ''}" data-filter="${c.key}">
          <div class="stat-dot" style="background:${c.color}"></div>
          <span class="stat-num">${c.num}</span>
          <span class="stat-label">${c.label}</span>
        </div>
      `).join('');

      panel.querySelectorAll('.stat-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const filter = chip.dataset.filter;
          activeFilter = (activeFilter === filter || filter === 'null') ? null : filter;
          renderMarkers(allRecords);
          updateStats(allRecords);
        });
      });
    }

    // ── RENDER MARKERS ──
    function renderMarkers(records) {
      clusterGroup.clearLayers();
      markers = {};

      let filtered = records;
      if (activeFilter === 'opened') {
        filtered = records.filter(r => r.A_Ouvert === 'Oui');
      } else if (activeFilter) {
        filtered = records.filter(r => r.Priorite === activeFilter);
      }

      filtered.forEach(r => {
        const lat = parseFloat(r.Latitude);
        const lng = parseFloat(r.Longitude);
        if (isNaN(lat) || isNaN(lng)) return;

        const color = getPrioColor(r.Priorite, r.Statut_Appel);
        const isSelected = r.id === selectedId;
        const icon = createIcon(isSelected ? COLORS.selected : color, isSelected);

        const marker = L.marker([lat, lng], { icon });
        marker.bindPopup(makePopup(r), { maxWidth: 320, minWidth: 260 });
        marker.recordId = r.id;

        marker.on('click', () => {
          selectedId = r.id;
          if (typeof grist !== 'undefined') {
            grist.setCursorPos({ rowId: r.id }).catch(() => {});
          }
          renderMarkers(allRecords);
        });

        markers[r.id] = marker;
        clusterGroup.addLayer(marker);
      });

      // Open selected popup
      if (selectedId && markers[selectedId]) {
        const m = markers[selectedId];
        clusterGroup.zoomToShowLayer(m, () => {
          m.openPopup();
        });
      }
    }

    // ── DEBUG HELPER ──
    function debugLog(msg, data) {
      console.log('[CRM-Map] ' + msg, data || '');
    }

    // ── GRIST INTEGRATION ──
    const isInGrist = (window.frameElement !== null) || (window.parent !== window);
    debugLog('In iframe (Grist)?', isInGrist);

    if (typeof grist !== 'undefined') {
      debugLog('Grist API detected, initializing...');

      grist.ready({
        requiredAccess: 'read table',
        allowSelectBy: true,
        columns: [
          { name: 'Nom_Ecole', type: 'Any', title: 'Nom Ecole' },
          { name: 'Latitude', type: 'Any', title: 'Latitude' },
          { name: 'Longitude', type: 'Any', title: 'Longitude' },
          { name: 'Commune', type: 'Any', title: 'Commune', optional: true },
          { name: 'Code_Postal', type: 'Any', title: 'Code Postal', optional: true },
          { name: 'Departement', type: 'Any', title: 'Departement', optional: true },
          { name: 'Telephone', type: 'Any', title: 'Telephone', optional: true },
          { name: 'Email', type: 'Any', title: 'Email', optional: true },
          { name: 'Campaign', type: 'Any', title: 'Campaign', optional: true },
          { name: 'A_Ouvert', type: 'Any', title: 'A Ouvert', optional: true },
          { name: 'Total_Opens', type: 'Any', title: 'Total Opens', optional: true },
          { name: 'Priorite', type: 'Any', title: 'Priorite', optional: true },
          { name: 'Statut_Appel', type: 'Any', title: 'Statut Appel', optional: true },
          { name: 'Notes', type: 'Any', title: 'Notes', optional: true },
          { name: 'Entreprises_Associees', type: 'Any', title: 'Entreprises', optional: true },
        ]
      });

      debugLog('grist.ready() called');

      grist.onRecords(function(records, mappings) {
        debugLog('onRecords fired, count:', records.length);
        debugLog('mappings:', JSON.stringify(mappings));

        // Try mapped columns first, fallback to raw records
        let data = grist.mapColumnNames(records, mappings);
        if (!data) {
          debugLog('mapColumnNames returned null — using raw records');
          data = records;
        }
        debugLog('First record sample:', JSON.stringify(data[0]).substring(0, 300));

        allRecords = data;
        renderMarkers(allRecords);
        updateStats(allRecords);
        document.getElementById('loading').classList.add('hidden');
      });

      grist.onRecord(function(record, mappings) {
        if (!record) return;
        debugLog('onRecord fired, id:', record.id);

        selectedId = record.id;

        // Update marker highlight
        Object.values(markers).forEach(m => {
          const r = allRecords.find(rec => rec.id === m.recordId);
          if (!r) return;
          const color = getPrioColor(r.Priorite, r.Statut_Appel);
          m.setIcon(createIcon(m.recordId === selectedId ? COLORS.selected : color, m.recordId === selectedId));
        });

        if (markers[selectedId]) {
          const m = markers[selectedId];
          map.setView(m.getLatLng(), Math.max(map.getZoom(), 12), { animate: true });
          setTimeout(() => m.openPopup(), 300);
        }
      });

    } else if (typeof DEMO_DATA !== 'undefined') {
      // ── DEMO / TEST MODE ──
      debugLog('Demo mode with', DEMO_DATA.length, 'records');
      allRecords = DEMO_DATA;
      renderMarkers(allRecords);
      updateStats(allRecords);
      document.getElementById('loading').classList.add('hidden');
    } else {
      document.getElementById('loading').innerHTML = '<span style="color:#888">Ouvrir dans Grist pour afficher les données.<br><small>Ou charger test.html pour tester.</small></span>';
      setTimeout(() => document.getElementById('loading').classList.add('hidden'), 3000);
    }
  </script>

</body>
</html>
